<!DOCTYPE html>
<html>
<head>
  <title>Firebase Init Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
    #logs { border: 1px solid #00ff00; padding: 10px; max-height: 500px; overflow-y: auto; }
    .log { margin: 5px 0; padding: 5px; border-left: 2px solid #00ff00; }
    .error { color: #ff4444; border-left-color: #ff4444; }
    .success { color: #44ff44; border-left-color: #44ff44; }
  </style>
</head>
<body>
  <h1>🔥 Firebase Initialization Test</h1>
  <div id="logs"></div>

  <script>
    // Override console.log/error to capture logs
    const logEl = document.getElementById('logs');
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;

    function addLog(msg, type = 'normal') {
      const div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = msg;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      originalLog(msg);
    }

    console.log = (...args) => addLog(args.join(' '), 'success');
    console.error = (...args) => addLog('ERROR: ' + args.join(' '), 'error');
    console.warn = (...args) => addLog('WARN: ' + args.join(' '), 'normal');

    addLog('📋 Test Started - Checking script load order...', 'success');
    addLog('Firebase SDK should load first...', 'normal');
  </script>

  <!-- Firebase SDK (v9 compat for easier migration) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    addLog('✅ Firebase SDK scripts loaded', 'success');
    addLog('typeof firebase = ' + typeof firebase, 'normal');
  </script>

  <!-- Firebase Configuration & Auth -->
  <script src="firebase-config.js"></script>

  <script>
    addLog('✅ firebase-config.js loaded', 'success');
    addLog('FirebaseAPI defined: ' + (typeof window.FirebaseAPI !== 'undefined'), 'normal');
    if (window.FirebaseAPI) {
      addLog('FirebaseAPI.isReady(): ' + (window.FirebaseAPI.isReady ? window.FirebaseAPI.isReady() : 'N/A'), 'normal');
    }
  </script>

  <script src="auth.js"></script>

  <script>
    addLog('✅ auth.js loaded', 'success');
    addLog('AuthManager defined: ' + (typeof window.AuthManager !== 'undefined'), 'normal');
    
    setTimeout(() => {
      addLog('📊 Final Status Check (500ms after all scripts):', 'normal');
      addLog('FirebaseAPI.isReady(): ' + (window.FirebaseAPI?.isReady?.() || false), 'normal');
      addLog('AuthManager.isSignedIn(): ' + (window.AuthManager?.isSignedIn?.() || false), 'normal');
      addLog('Test Complete ✅', 'success');
    }, 500);
  </script>
</body>
</html>
